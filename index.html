<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>메이플스토리 알리미 테스트</title>
    <style>
        body { background-color: #222; color: white; font-family: sans-serif; text-align: center; }
        #gameVideo { display: none; } /* 원본 비디오는 숨김 */
        #gameCanvas { border: 2px solid #444; margin-top: 20px; max-width: 800px; }
        .info-box { margin-top: 15px; font-size: 20px; color: #00ff00; }
    </style>
</head>
<body>
    <h2>메이플 화면 인식 테스트</h2>
    <button id="startBtn" style="padding: 10px 20px; font-size: 16px; cursor: pointer;">1. 메이플 창 선택하기</button>
    
    <div class="info-box">
        현재 지정된 X, Y 좌표의 색상 (RGB): <span id="colorResult">대기 중...</span>
    </div>

    <video id="gameVideo" autoplay></video>
    <canvas id="gameCanvas"></canvas>

    <script>
        const video = document.getElementById('gameVideo');
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d', { willReadFrequently: true });
        const colorResult = document.getElementById('colorResult');

        // ★ 여기서 내가 감시하고 싶은 화면 속 X, Y 좌표를 설정합니다!
        const targetX = 500; 
        const targetY = 300; 

        document.getElementById('startBtn').addEventListener('click', async () => {
            try {
                // 화면 공유 창 띄우기
                const stream = await navigator.mediaDevices.getDisplayMedia({ video: true });
                video.srcObject = stream;
                
                // 비디오가 재생되기 시작하면 도화지(Canvas) 크기를 맞추고 인식 루프 시작
                video.onplay = () => {
                    canvas.width = video.videoWidth;
                    canvas.height = video.videoHeight;
                    requestAnimationFrame(analyzeFrame);
                };
            } catch (err) {
                alert("화면 공유가 취소되었습니다.");
            }
        });

        // 1초에 수십 번씩 화면을 캡처하고 색상을 읽어내는 핵심 루프 함수
        function analyzeFrame() {
            if (video.paused || video.ended) return;

            // 1. 비디오 영상을 캔버스에 그리기
            ctx.drawImage(video, 0, 0, canvas.width, canvas.height);

            // 2. 지정한 좌표(targetX, targetY)의 픽셀 1개 데이터(색상) 가져오기
            const pixelData = ctx.getImageData(targetX, targetY, 1, 1).data;
            const r = pixelData[0];
            const g = pixelData[1];
            const b = pixelData[2];

            // 3. 화면에 현재 색상 값 출력 (테스트용)
            colorResult.innerText = `R:${r}, G:${g}, B:${b}`;

            // 4. 화면에 내가 인식하고 있는 위치에 빨간색 점 찍어서 보여주기
            ctx.fillStyle = "red";
            ctx.fillRect(targetX - 5, targetY - 5, 10, 10);

            // 다음 프레임 계속 반복
            requestAnimationFrame(analyzeFrame);
        }
    </script>
</body>
</html>
